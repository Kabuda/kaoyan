services:
  mysql:
    image: mysql:8.4
    container_name: kaoyan-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kaoyan}
      MYSQL_USER: ${MYSQL_USER:-kaoyan}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kaoyan_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: kaoyan-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Kaoyan 11408 Study Dashboard}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-kaoyan}:${MYSQL_PASSWORD:-kaoyan_password}@mysql:3306/${MYSQL_DATABASE:-kaoyan}?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-deploy}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-change-me-now}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

