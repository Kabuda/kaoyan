services:
  mysql:
    image: mysql:8.4
    container_name: kaoyan-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kaoyan}
      MYSQL_USER: ${MYSQL_USER:-kaoyan}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kaoyan_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: kaoyan-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Kaoyan 11408 Study Dashboard}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-kaoyan}:${MYSQL_PASSWORD:-kaoyan_password}@mysql:3306/${MYSQL_DATABASE:-kaoyan}?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-deploy}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-change-me-now}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-8388608}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      ARK_VISION_MODEL: ${ARK_VISION_MODEL:-doubao-1-5-vision-pro-32k-250115}
      ARK_TEXT_MODEL: ${ARK_TEXT_MODEL:-doubao-1-5-pro-32k-250115}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: kaoyan-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
